<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL FAGER | لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <style>
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--secondary-bg); padding: 40px; border-radius: 24px;
            border: 1px solid var(--border-color); width: 100%; max-width: 400px;
            box-shadow: 0 0 30px rgba(194, 33, 58, 0.2);
        }
    </style>
</head>
<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-box text-center">
            <i class="fa-solid fa-bolt text-warning fa-3x mb-4"></i>
            <h3 class="fw-bold mb-4">EL FAGER ADMIN</h3>
            <form id="admin-login-form">
                <div class="mb-3 text-start">
                    <label class="small text-white-50">البريد الإلكتروني</label>
                    <input type="email" id="login-email" class="form-control" required placeholder="admin@icloth.com">
                </div>
                <div class="mb-4 text-start">
                    <label class="small text-white-50">كلمة المرور</label>
                    <input type="password" id="login-pass" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">دخول النظام</button>
            </form>
            <p class="mt-4 small text-white-50">حصري لمديري النظام فقط</p>
        </div>
    </div>

    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="glass-sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading">
                <i class="fa-solid fa-bolt text-warning fa-2x mb-2 pulse-primary"></i>
                <h4 class="fw-bold m-0">EL FAGER</h4>
                <small class="text-white-50">GAMING SYSTEM</small>
            </div>
            <div class="list-group list-group-flush my-3 px-3">
                <a href="#" class="list-group-item active" onclick="showTab('main')"><i class="fa-solid fa-house"></i> الرئيسية</a>
                <a href="#" class="list-group-item" onclick="showTab('products')"><i class="fa-solid fa-box-open"></i> المنتجات</a>
                <a href="#" class="list-group-item" onclick="showTab('orders')"><i class="fa-solid fa-cart-shopping"></i> الطلبات</a>
                <div class="sidebar-divider my-2 border-top border-secondary"></div>
                <a href="index.html" class="list-group-item"><i class="fa-solid fa-eye"></i> عرض الموقع</a>
                <a href="#" onclick="logout()" class="list-group-item text-danger mt-5"><i class="fa-solid fa-right-from-bracket"></i> خروج</a>
            </div>
        </div>

        <div id="admin-main-content" class="w-100" style="display: none;">
            <!-- Header -->
            <nav class="navbar navbar-expand-lg navbar-dark glass-nav px-4 py-3">
                <h5 class="mb-0 fw-black glow-text">لوحة التحكم المركزية</h5>
            </nav>

            <!-- Dashboard Content -->
            <div id="main-section" class="container-fluid px-4 py-4">
                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="glass-card stat-card gaming-card">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-white-50 mb-1">إجمالي المنتجات</p>
                                    <h2 class="fw-bold m-0" id="stat-total-products">0</h2>
                                </div>
                                <div class="icon-box bg-primary"><i class="fa-solid fa-box"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="glass-card stat-card gaming-card">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <p class="text-white-50 mb-1">إجمالي الطلبات</p>
                                    <h2 class="fw-bold m-0" id="stat-total-orders">0</h2>
                                </div>
                                <div class="icon-box bg-success"><i class="fa-solid fa-cart-shopping"></i></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-4">
                    <h5 class="fw-bold mb-4">أحدث الطلبات</h5>
                    <div id="orders-list-body">
                        <!-- Loading or Orders -->
                        <div class="text-center py-5 opacity-50">جاري تحميل البيانات...</div>
                    </div>
                </div>
            </div>

            <!-- Products Section -->
            <div id="products-section" class="container-fluid px-4 py-4" style="display:none;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold">إدارة البضاعة</h5>
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#productModal"><i class="fa-solid fa-plus"></i> إضافة منتج</button>
                </div>
                <div class="glass-card">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr>
                                <th>الصورة</th>
                                <th>الاسم</th>
                                <th>الفئة</th>
                                <th>السعر</th>
                                <th>إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="products-grid-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- Orders Section -->
            <div id="orders-section" class="container-fluid px-4 py-4" style="display:none;">
                <h5 class="fw-bold mb-4">سجل المبيعات والطلبات</h5>
                <div id="orders-full-list">
                    <!-- Same as summary list but could be more detailed -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/admin-logic.js"></script>
    <script>
        function showTab(tab) {
            document.getElementById('main-section').style.display = 'none';
            document.getElementById('products-section').style.display = 'none';
            document.getElementById('orders-section').style.display = 'none';
            
            document.getElementById(tab + '-section').style.display = 'block';
            
            document.querySelectorAll('.list-group-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
