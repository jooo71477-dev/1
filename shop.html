<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICLOTH | المتجر</title>
  <meta name="description" content="تسوق أحدث الأزياء في متجر ICLOTH">
  <meta name="theme-color" content="#080808">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ── SHOP PAGE ── */

    .shop-hero {
      padding: 56px 48px 36px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(194,33,58,0.06) 0%, transparent 100%);
    }

    .shop-hero-inner {
      max-width: 1280px;
      margin: 0 auto;
    }

    .shop-hero h1 {
      font-family: var(--font-brand);
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .shop-hero p {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── LAYOUT ── */
    .shop-layout {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 48px 80px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 40px;
      align-items: start;
    }

    /* ── SIDEBAR FILTERS ── */
    .sidebar-filters {
      position: sticky;
      top: 88px;
    }

    .filter-section { margin-bottom: 28px; }

    .filter-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filter-clear {
      font-size: 0.68rem;
      color: var(--red);
      cursor: pointer;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 500;
    }

    .filter-options { display: flex; flex-direction: column; gap: 6px; }

    .filter-opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .filter-opt:hover { background: rgba(255,255,255,0.04); color: white; }

    .filter-opt.active {
      background: var(--red-dim);
      border-color: var(--red-border);
      color: white;
    }

    .filter-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
    }

    .filter-opt.active .filter-dot { background: var(--red); }

    /* ── MAIN AREA ── */
    .shop-main {}

    /* Top bar */
    .shop-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .results-count {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .results-count strong { color: white; font-weight: 600; }

    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sort-label { font-size: 0.78rem; color: var(--muted); }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: white;
      padding: 8px 14px;
      font-family: var(--font-body);
      font-size: 0.82rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .sort-select:focus { border-color: var(--border2); }

    /* ── PRODUCTS GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
    }

    /* Product Card */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      border-color: var(--border2);
      transform: translateY(-5px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .p-img-wrap {
      position: relative;
      aspect-ratio: 4/5;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }

    .p-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s var(--ease);
    }

    .product-card:hover .p-img-wrap img { transform: scale(1.05); }

    .p-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    .p-placeholder i { font-size: 3rem; opacity: 0.06; }

    .p-discount-tag {
      position: absolute;
      top: 12px;
      inset-inline-start: 12px;
      background: var(--red);
      color: white;
      font-size: 0.68rem;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 6px;
      letter-spacing: 0.5px;
    }

    .p-wish {
      position: absolute;
      top: 10px;
      inset-inline-end: 10px;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
      backdrop-filter: blur(4px);
    }

    .product-card:hover .p-wish { opacity: 1; }
    .p-wish:hover { color: var(--red) !important; }

    .p-body { padding: 14px 16px 0; flex: 1; }

    .p-cat { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; }

    .p-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-price {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .p-price-now { font-size: 1rem; font-weight: 800; }
    .p-price-old { font-size: 0.78rem; color: var(--muted); text-decoration: line-through; }

    .p-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .p-stock {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .p-stock-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .p-stock-dot.low { background: #f59e0b; }
    .p-stock-dot.out { background: var(--red); }

    .p-add-btn {
      width: 32px; height: 32px;
      background: var(--red);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.8rem;
      transition: background 0.2s;
    }

    .p-add-btn:hover { background: #d9273f; }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state .e-icon {
      font-size: 4rem;
      opacity: 0.1;
      margin-bottom: 20px;
      display: block;
    }

    .empty-state h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 300px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── SKELETON ── */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: skeletonPulse 1.5s ease-in-out infinite;
    }

    .sk-img { aspect-ratio: 4/5; background: rgba(255,255,255,0.04); }
    .sk-line {
      height: 13px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      margin: 16px 16px 8px;
    }
    .sk-line.short { width: 55%; }

    @keyframes skeletonPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .shop-layout { grid-template-columns: 180px 1fr; gap: 28px; padding-inline: 24px; }
    }

    @media (max-width: 768px) {
      .shop-hero { padding: 32px 16px 24px; }
      .shop-layout { grid-template-columns: 1fr; padding: 16px 16px 60px; }
      .sidebar-filters { position: static; display: flex; gap: 8px; flex-wrap: wrap; overflow-x: auto; }
      .filter-section { display: flex; gap: 6px; flex-direction: row; align-items: center; margin-bottom: 0; }
      .filter-title { display: none; }
      .filter-options { flex-direction: row; }
      .filter-opt { padding: 6px 12px; border: 1px solid var(--border); border-radius: 50px; white-space: nowrap; font-size: 0.78rem; }
      .filter-dot { display: none; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>

  <div id="header-mount"></div>

  <!-- HERO -->
  <div class="shop-hero">
    <div class="shop-hero-inner">
      <span class="section-label">THE STORE</span>
      <h1 data-i18n="shop_title">المتجر</h1>
      <p data-i18n="shop_sub">أحدث الأزياء · جودة راقية · توصيل سريع</p>
    </div>
  </div>

  <!-- SHOP LAYOUT -->
  <div class="shop-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar-filters">
      <div class="filter-section">
        <div class="filter-title">
          <span id="filterCatLabel">الفئة</span>
        </div>
        <div class="filter-options" id="catFilters">
          <div class="filter-opt active" data-cat="all">
            <span class="filter-dot"></span>
            <span data-i18n="all_cats">الكل</span>
          </div>
          <div class="filter-opt" data-cat="jackets">
            <span class="filter-dot"></span>
            <span id="catJackets">جاكيتات</span>
          </div>
          <div class="filter-opt" data-cat="tshirts">
            <span class="filter-dot"></span>
            <span id="catTshirts">تيشرتات</span>
          </div>
          <div class="filter-opt" data-cat="hoodies">
            <span class="filter-dot"></span>
            <span id="catHoodies">هوديز</span>
          </div>
          <div class="filter-opt" data-cat="pants">
            <span class="filter-dot"></span>
            <span id="catPants">بناطيل</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="shop-main">
      <div class="shop-topbar">
        <p class="results-count" id="resultsCount"></p>
        <div class="sort-wrap">
          <span class="sort-label" data-i18n="sort_label">ترتيب</span>
          <select class="sort-select" id="sortSelect">
            <option value="newest" data-i18n="sort_newest">الأحدث</option>
            <option value="price_asc" data-i18n="sort_price_asc">السعر: الأقل أولاً</option>
            <option value="price_desc" data-i18n="sort_price_desc">السعر: الأعلى أولاً</option>
            <option value="discount" data-i18n="sort_discount">أعلى خصم</option>
          </select>
        </div>
      </div>

      <div class="products-grid" id="productsGrid">
        <!-- Skeleton loading -->
        ${Array(6).fill(`
          <div class="skeleton-card">
            <div class="sk-img"></div>
            <div class="sk-line"></div>
            <div class="sk-line short"></div>
          </div>
        `).join('')}
      </div>
    </main>

  </div>

  <div id="footer-mount"></div>

  <script type="module">
    import { initLang, initPWA, buildHeader, buildFooter, TRANSLATIONS } from './i18n.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // Firebase
    const app = initializeApp({
      apiKey: "AIzaSyByPZP1qo0sQN26xTwzpT0vnw_BTguXvSI",
      authDomain: "ic12-e6ad7.firebaseapp.com",
      projectId: "ic12-e6ad7",
      storageBucket: "ic12-e6ad7.firebasestorage.app",
      messagingSenderId: "849964207533",
      appId: "1:849964207533:web:8a6669e5c453ca08ba2524"
    });
    const db = getFirestore(app);

    // State
    let allProducts = [];
    let activeCat = 'all';
    let currentLang = localStorage.getItem('icloth_lang') || 'ar';

    // Header / Footer
    document.getElementById('header-mount').innerHTML = buildHeader('shop');
    document.getElementById('footer-mount').innerHTML = buildFooter();
    initLang();
    initPWA();

    // Load from Firestore
    async function loadProducts() {
      try {
        const snap = await getDocs(query(collection(db, 'products'), orderBy('createdAt', 'desc')));
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        allProducts = [];
      }
      renderProducts(filterSort());
    }

    function filterSort() {
      let list = activeCat === 'all' ? [...allProducts]
        : allProducts.filter(p => p.categoryKey === activeCat);

      const sort = document.getElementById('sortSelect').value;
      if (sort === 'price_asc')  list.sort((a,b) => a.priceAfter - b.priceAfter);
      if (sort === 'price_desc') list.sort((a,b) => b.priceAfter - a.priceAfter);
      if (sort === 'discount')   list.sort((a,b) =>
        ((b.priceBefore-b.priceAfter)/b.priceBefore) - ((a.priceBefore-a.priceAfter)/a.priceBefore));
      return list;
    }

    function renderProducts(list) {
      const t = TRANSLATIONS[currentLang];
      const grid = document.getElementById('productsGrid');
      const count = document.getElementById('resultsCount');

      count.innerHTML = `<strong>${list.length}</strong> ${currentLang === 'ar' ? 'منتج' : 'products'}`;

      if (!list.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <span class="e-icon"><i class="fa-solid fa-shirt"></i></span>
            <h2 data-i18n="empty_title">${t.empty_title}</h2>
            <p data-i18n="empty_sub">${t.empty_sub}</p>
          </div>`;
        return;
      }

      const disc = (b,a) => b > a ? Math.round(((b-a)/b)*100) : 0;
      const stockLabel = (s, t) => {
        if (s <= 0) return `<span class="p-stock-dot out"></span><span data-i18n="out_stock">${t.out_stock}</span>`;
        if (s < 10) return `<span class="p-stock-dot low"></span><span data-i18n="low_stock">${t.low_stock}</span>`;
        return `<span class="p-stock-dot"></span><span data-i18n="in_stock">${t.in_stock}</span>`;
      };

      grid.innerHTML = list.map(p => `
        <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
          <div class="p-img-wrap">
            ${p.images?.[0]
              ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">`
              : `<div class="p-placeholder"><i class="fa-solid fa-shirt"></i></div>`}
            ${disc(p.priceBefore, p.priceAfter) > 0
              ? `<span class="p-discount-tag">-${disc(p.priceBefore, p.priceAfter)}%</span>` : ''}
            <button class="p-wish" onclick="event.stopPropagation()">
              <i class="fa-regular fa-heart"></i>
            </button>
          </div>
          <div class="p-body">
            <p class="p-cat">${p.category || ''}</p>
            <h3 class="p-name">${p.name}</h3>
            <div class="p-price">
              <span class="p-price-now">LE ${(p.priceAfter||0).toLocaleString()}</span>
              ${p.priceBefore > p.priceAfter
                ? `<span class="p-price-old">LE ${(p.priceBefore||0).toLocaleString()}</span>` : ''}
            </div>
          </div>
          <div class="p-footer">
            <div class="p-stock">${stockLabel(p.stock, t)}</div>
            <button class="p-add-btn" onclick="event.stopPropagation()">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    // Category filter
    document.getElementById('catFilters').addEventListener('click', e => {
      const opt = e.target.closest('.filter-opt');
      if (!opt) return;
      document.querySelectorAll('.filter-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      activeCat = opt.dataset.cat;
      renderProducts(filterSort());
    });

    // Sort
    document.getElementById('sortSelect').addEventListener('change', () => {
      renderProducts(filterSort());
    });

    // Lang change
    document.addEventListener('langchange', ({ detail: { lang } }) => {
      currentLang = lang;
      const isAr = lang === 'ar';
      document.getElementById('filterCatLabel').textContent = isAr ? 'الفئة' : 'Category';
      document.getElementById('catJackets').textContent = isAr ? 'جاكيتات' : 'Jackets';
      document.getElementById('catTshirts').textContent = isAr ? 'تيشرتات' : 'T-Shirts';
      document.getElementById('catHoodies').textContent = isAr ? 'هوديز' : 'Hoodies';
      document.getElementById('catPants').textContent = isAr ? 'بناطيل' : 'Pants';
      renderProducts(filterSort());
    });

    // Load products from URL query param
    const urlCat = new URLSearchParams(location.search).get('cat');
    if (urlCat) {
      const opt = document.querySelector(`.filter-opt[data-cat="${urlCat}"]`);
      if (opt) {
        document.querySelectorAll('.filter-opt').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        activeCat = urlCat;
      }
    }

    loadProducts();
  </script>

  <script>
    // Generate skeletons
    const grid = document.getElementById('productsGrid');
    if (grid) {
      grid.innerHTML = Array(6).fill(`
        <div class="skeleton-card">
          <div class="sk-img"></div>
          <div class="sk-line"></div>
          <div class="sk-line short"></div>
        </div>
      `).join('');
    }
  </script>

</body>
</html>
