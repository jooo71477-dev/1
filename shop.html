<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICLOTH | المتجر</title>
    <meta name="description" content="تسوق أحدث الأزياء في متجر ICLOTH">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --red: #c2213a;
            --bg: #060606;
            --card-bg: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #fff;
            --muted: rgba(255,255,255,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .shop-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(6,6,6,0.9);
            backdrop-filter: blur(16px);
            z-index: 100;
        }

        .shop-logo img {
            height: 38px;
            width: auto;
            object-fit: contain;
        }

        .shop-nav { display: flex; gap: 28px; align-items: center; }

        .shop-nav a {
            text-decoration: none;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .shop-nav a:hover { color: white; }

        .shop-icons { display: flex; gap: 18px; align-items: center; }

        .shop-icons i {
            font-size: 1rem;
            color: var(--muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .shop-icons i:hover { color: white; }

        /* ── HERO BANNER ── */
        .shop-hero {
            padding: 60px 40px 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .shop-hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .shop-hero p {
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* ── FILTERS BAR ── */
        .filters-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            border-bottom: 1px solid var(--border);
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; }

        .chip {
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 50px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
        }

        .chip:hover, .chip.active {
            border-color: var(--red);
            color: white;
            background: rgba(194,33,58,0.1);
        }

        .sort-select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            padding: 8px 14px;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        /* ── PRODUCTS GRID ── */
        .products-section { padding: 32px 40px; min-height: 60vh; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        /* Product Card */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:hover {
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .product-img {
            width: 100%;
            aspect-ratio: 4/5;
            object-fit: cover;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-img-placeholder {
            width: 100%;
            aspect-ratio: 4/5;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-img-placeholder i {
            font-size: 2.5rem;
            opacity: 0.08;
        }

        .discount-tag {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--red);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 9px;
            border-radius: 6px;
        }

        .product-info { padding: 16px; }

        .product-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-info .cat {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-now {
            font-size: 1.05rem;
            font-weight: 700;
            color: white;
        }

        .price-old {
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: line-through;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        .stock-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .stock-dot::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }

        .stock-dot.low::before { background: #f59e0b; }
        .stock-dot.out::before { background: var(--red); }

        .add-to-cart-quick {
            width: 34px;
            height: 34px;
            background: var(--red);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .add-to-cart-quick:hover { background: #d9273f; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--muted);
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            opacity: 0.15;
            margin-bottom: 24px;
            display: block;
        }

        .empty-state h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: rgba(255,255,255,0.6);
        }

        .empty-state p {
            font-size: 0.9rem;
            opacity: 0.7;
            max-width: 340px;
            margin: 0 auto;
            line-height: 1.7;
        }

        /* ── LOADING ── */
        .loading-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .skeleton {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-img { aspect-ratio: 4/5; background: rgba(255,255,255,0.04); }
        .skeleton-line { height: 14px; background: rgba(255,255,255,0.04); border-radius: 6px; margin: 16px 16px 8px; }
        .skeleton-line.short { width: 60%; margin-top: 0; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── FOOTER ── */
        .shop-footer {
            border-top: 1px solid var(--border);
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--muted);
            font-size: 0.8rem;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .shop-header { padding: 14px 20px; }
            .shop-nav { display: none; }
            .shop-hero { padding: 40px 20px 30px; }
            .filters-bar { padding: 12px 20px; }
            .products-section { padding: 20px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
            .shop-footer { padding: 20px; flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="shop-header">
        <a href="index.html" class="shop-logo">
            <img src="logo/logo2..png" alt="ICLOTH">
        </a>
        <nav class="shop-nav">
            <a href="index.html">الرئيسية</a>
            <a href="shop.html" style="color:white;">المنتجات</a>
            <a href="#">من نحن</a>
            <a href="#">تواصل</a>
        </nav>
        <div class="shop-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>
    </header>

    <!-- HERO -->
    <div class="shop-hero">
        <h1>المتجر</h1>
        <p>أحدث الأزياء · جودة عالية · شحن سريع</p>
    </div>

    <!-- FILTERS -->
    <div class="filters-bar">
        <div class="filter-chips">
            <button class="chip active" data-cat="all">الكل</button>
            <button class="chip" data-cat="jackets">جاكيتات</button>
            <button class="chip" data-cat="tshirts">تيشرتات</button>
            <button class="chip" data-cat="hoodies">هوديز</button>
            <button class="chip" data-cat="pants">بناطيل</button>
        </div>
        <select class="sort-select" id="sortSelect">
            <option value="newest">الأحدث</option>
            <option value="price_asc">السعر: الأقل أولاً</option>
            <option value="price_desc">السعر: الأعلى أولاً</option>
            <option value="discount">أعلى خصم</option>
        </select>
    </div>

    <!-- PRODUCTS -->
    <section class="products-section">
        <div id="productsContainer">
            <!-- Loading skeletons -->
            <div class="loading-grid" id="loadingGrid">
                ${[...Array(8)].map(() => `
                <div class="skeleton">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>`).join('')}
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="shop-footer">
        <span>© 2026 ICLOTH — Kafr Shukr</span>
        <span>صُنع بـ ❤️ في مصر</span>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByPZP1qo0sQN26xTwzpT0vnw_BTguXvSI",
            authDomain: "ic12-e6ad7.firebaseapp.com",
            projectId: "ic12-e6ad7",
            storageBucket: "ic12-e6ad7.firebasestorage.app",
            messagingSenderId: "849964207533",
            appId: "1:849964207533:web:8a6669e5c453ca08ba2524"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];
        let activeCategory = 'all';

        // Load products from Firestore
        async function loadProducts() {
            try {
                const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);
                allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderProducts(allProducts);
            } catch (err) {
                console.error('Error loading products:', err);
                renderProducts([]);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            document.getElementById('loadingGrid')?.remove();

            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-icon"><i class="fa-solid fa-shirt"></i></span>
                        <h2>لا توجد منتجات حتى الآن</h2>
                        <p>سيتم إضافة المنتجات قريباً — تابعنا!</p>
                    </div>
                `;
                return;
            }

            const discPct = (b, a) => b > a ? Math.round(((b - a) / b) * 100) : 0;

            const stockLabel = (stock) => {
                if (stock <= 0) return '<span class="stock-dot out">نفذ</span>';
                if (stock < 10) return '<span class="stock-dot low">كمية محدودة</span>';
                return '<span class="stock-dot">متوفر</span>';
            };

            container.innerHTML = `
                <div class="products-grid">
                    ${products.map(p => `
                    <div class="product-card" onclick="window.location.href='product.html?id=${p.id}'">
                        <div style="position:relative;">
                            ${p.images && p.images[0]
                                ? `<div class="product-img"><img src="${p.images[0]}" alt="${p.name}" loading="lazy"></div>`
                                : `<div class="product-img-placeholder"><i class="fa-solid fa-shirt"></i></div>`
                            }
                            ${discPct(p.priceBefore, p.priceAfter) > 0
                                ? `<span class="discount-tag">-${discPct(p.priceBefore, p.priceAfter)}%</span>`
                                : ''
                            }
                        </div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p class="cat">${p.category || ''}</p>
                            <div class="price-row">
                                <span class="price-now">LE ${p.priceAfter?.toLocaleString()}</span>
                                ${p.priceBefore > p.priceAfter ? `<span class="price-old">LE ${p.priceBefore?.toLocaleString()}</span>` : ''}
                            </div>
                        </div>
                        <div class="card-footer">
                            ${stockLabel(p.stock)}
                            <button class="add-to-cart-quick" onclick="event.stopPropagation(); alert('سيتم إضافة السلة قريباً!')">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                    `).join('')}
                </div>
            `;
        }

        // Filter chips
        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                activeCategory = chip.dataset.cat;

                const filtered = activeCategory === 'all'
                    ? allProducts
                    : allProducts.filter(p => p.categoryKey === activeCategory);
                renderProducts(filtered);
            });
        });

        // Sort
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            const val = e.target.value;
            let sorted = [...allProducts];
            if (val === 'price_asc') sorted.sort((a, b) => a.priceAfter - b.priceAfter);
            if (val === 'price_desc') sorted.sort((a, b) => b.priceAfter - a.priceAfter);
            if (val === 'discount') sorted.sort((a, b) =>
                ((b.priceBefore - b.priceAfter) / b.priceBefore) - ((a.priceBefore - a.priceAfter) / a.priceBefore)
            );
            renderProducts(sorted);
        });

        loadProducts();
    </script>

    <script>
        // Generate loading skeletons
        const grid = document.getElementById('loadingGrid');
        if (grid) {
            grid.innerHTML = Array(8).fill(`
                <div class="skeleton">
                    <div class="skeleton-img"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            `).join('');
        }
    </script>

</body>

</html>
