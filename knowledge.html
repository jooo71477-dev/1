<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل التشغيل | ICLOTH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="glass-sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading">
                <img src="logo/logo2..png" alt="ICLOTH" style="height: 45px;">
                <h5 class="fw-bold mt-2 text-white">ICLOTH SOP</h5>
            </div>
            <div class="list-group list-group-flush my-3 px-3">
                <a href="dashboard.html" class="list-group-item"><i class="fa-solid fa-house"></i> الرئيسية</a>
                <a href="products-enhanced.html" class="list-group-item"><i class="fa-solid fa-box"></i> المنتجات</a>
                <a href="orders.html" class="list-group-item"><i class="fa-solid fa-cart-shopping"></i> الطلبات</a>
                <a href="knowledge.html" class="list-group-item active"><i class="fa-solid fa-book-open"></i> دليل الموظف</a>
                <a href="operations.html" class="list-group-item"><i class="fa-solid fa-microchip"></i> مركز العمليات</a>
                <a href="customers.html" class="list-group-item"><i class="fa-solid fa-users"></i> العملاء</a>
                <a href="reports.html" class="list-group-item"><i class="fa-solid fa-chart-line"></i> التقارير</a>
                <a href="settings.html" class="list-group-item mt-auto"><i class="fa-solid fa-gear"></i> الإعدادات</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark glass-nav px-4 py-3">
                <h5 class="mb-0 text-white fw-bold">إجراءات التشغيل والمعرفة (SOP)</h5>
                <button class="btn btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#addKnowledgeModal">
                    <i class="fa-solid fa-plus me-2"></i> إضافة تعليمات جديدة
                </button>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="row mb-4">
                    <div class="col-md-12">
                        <div class="glass-card p-3">
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-0 text-white-50"><i class="fa-solid fa-magnifying-glass"></i></span>
                                <input type="text" id="knowledgeSearch" class="form-control bg-transparent border-0 text-white shadow-none" placeholder="ابحث في دليل التشغيل...">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4" id="knowledgeGrid">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-primary"></div>
                        <p class="text-white-50 mt-2">جاري تحميل دليل التشغيل...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="addKnowledgeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content glass-card p-0 border-secondary">
                <div class="modal-header border-secondary p-4">
                    <h5 class="modal-title fw-bold">إضافة تعليمات / SOP</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="knowledgeForm">
                        <div class="mb-3">
                            <label class="form-label">العنوان (مثلاً: كيفية التعامل مع المرتجعات)</label>
                            <input type="text" id="kTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">التصنيف</label>
                            <select id="kCategory" class="form-select">
                                <option value="orders">الطلبات</option>
                                <option value="products">المنتجات</option>
                                <option value="customers">خدمة العملاء</option>
                                <option value="technical">تقني / إدارة</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">المحتوى / الخطوات التفصيلية</label>
                            <textarea id="kContent" class="form-control" rows="10" placeholder="اكتب الخطوات بالتفصيل هنا..." required></textarea>
                        </div>
                        <div class="text-end">
                            <button type="button" class="btn btn-outline-light me-2" data-bs-dismiss="modal">إلغاء</button>
                            <button type="submit" class="btn btn-primary px-4">حفظ الدليل</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/knowledge.js"></script>
</body>
</html>
