<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICLOTH — Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="logo/logo2..png" alt="ICLOTH">
                    <span>ADMIN</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-label">Main</div>
                <ul>
                    <li class="active" data-section="overview">
                        <i class="fa-solid fa-chart-line"></i> Overview
                    </li>
                    <li data-section="orders">
                        <i class="fa-solid fa-cart-shopping"></i> Orders
                        <span class="badge" id="ordersBadge">0</span>
                    </li>
                    <li data-section="products">
                        <i class="fa-solid fa-shirt"></i> Products
                    </li>
                    <li data-section="categories">
                        <i class="fa-solid fa-layer-group"></i> Categories
                    </li>

                    <div class="nav-label">Marketing</div>
                    <li data-section="offers">
                        <i class="fa-solid fa-percent"></i> Offers & Deals
                    </li>
                    <li data-section="flashsale">
                        <i class="fa-solid fa-bolt"></i> Flash Sale
                    </li>
                    <li data-section="coupons">
                        <i class="fa-solid fa-ticket"></i> Coupons
                    </li>
                    <li data-section="banners">
                        <i class="fa-solid fa-image"></i> Banners
                    </li>

                    <div class="nav-label">Operations</div>
                    <li data-section="customers">
                        <i class="fa-solid fa-crown"></i> Top Customers
                    </li>
                    <li data-section="shipping">
                        <i class="fa-solid fa-truck-fast"></i> Shipping
                    </li>
                    <li data-section="reviews">
                        <i class="fa-solid fa-star"></i> Reviews
                    </li>
                    <li data-section="settings">
                        <i class="fa-solid fa-gear"></i> Settings
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="admin-profile">
                    <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
                    <div class="admin-info">
                        <span class="name">Yousef Adly</span>
                        <span class="role">Super Admin</span>
                    </div>
                </div>
                <button class="logout-btn" title="Sign Out">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content-area">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="globalSearch" placeholder="Search orders, products, customers...">
                </div>
                <div class="top-utils">
                    <div class="notification-bell">
                        <i class="fa-regular fa-bell"></i>
                        <span class="noti-dot"></span>
                    </div>
                    <div class="maintenance-mode-toggle">
                        <label class="switch">
                            <input type="checkbox" checked id="liveMode">
                            <span class="slider round"></span>
                        </label>
                        <span id="liveModeLabel">Live</span>
                    </div>
                    <a href="shop.html" target="_blank" style="display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.8rem; transition:0.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">
                        <i class="fa-solid fa-store"></i> View Store
                    </a>
                </div>
            </header>

            <div class="view-content" id="main-view"></div>
        </main>
    </div>

    <!-- Universal Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-grid"></div>
        </div>
    </div>

    <script type="module" src="admin-auth.js"></script>
    <script src="admin.js"></script>
</body>

</html>
