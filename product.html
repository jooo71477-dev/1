<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cropped Jacket (Black) | ICLOTH</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="product-page">
    <!-- Top Announcement Bar -->
    <div class="announcement-bar">
        <span>WELCOME TO ICLOTH STORE</span>
        <span>FREE SHIPPING ON ALL ORDERS</span>
        <div class="top-nav-utils">
            <span>EGP <i class="fa-solid fa-chevron-down"></i></span>
        </div>
    </div>

    <!-- Main Header -->
    <header class="main-header">
        <div class="logo">ICLOTH</div>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">All Products</a></li>
                <li><a href="#">Winter Collection</a></li>
                <li><a href="#">About us</a></li>
                <li><a href="#">Contact us</a></li>
            </ul>
        </nav>
        <div class="header-icons">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-user"></i>
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>
    </header>

    <main class="product-container">
        <!-- Image Gallery -->
        <div class="product-gallery">
            <div class="thumbnails">
                <div class="thumb active"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
                <div class="thumb"></div>
            </div>
            <div class="main-image-container">
                <div class="main-image-placeholder">
                    <div class="nav-arrow prev"><i class="fa-solid fa-chevron-left"></i></div>
                    <div class="nav-arrow next"><i class="fa-solid fa-chevron-right"></i></div>
                </div>
            </div>
        </div>

        <!-- Product Info -->
        <div class="product-details">
            <h1 class="product-title">Cropped Jacket (Black)</h1>
            <div class="price-section">
                <span class="current-price">LE 699.00</span>
                <span class="old-price">LE 2,000.00</span>
                <span class="discount-badge">65% OFF</span>
            </div>

            <div class="stock-info">
                <div class="stock-status">
                    <span class="dot"></span>
                    Low stock
                </div>
                <div class="stock-progress">
                    <div class="progress-bar"></div>
                </div>
            </div>

            <div class="size-selection">
                <div class="size-header">
                    <span>Size: S (50-70)kg 165cm</span>
                    <a href="#" class="find-size">Find your size</a>
                </div>
                <div class="size-options">
                    <button class="size-btn active">S (50-70)kg 165cm</button>
                    <button class="size-btn">M (70-80)kg 175cm</button>
                    <button class="size-btn disabled">L (80-85)kg 180cm</button>
                    <button class="size-btn disabled">XL (85-90)kg 185cm</button>
                </div>
            </div>

            <div class="quantity-section">
                <label>Quantity</label>
                <div class="quantity-selector">
                    <button class="qty-btn minus">-</button>
                    <input type="number" value="1" min="1">
                    <button class="qty-btn plus">+</button>
                </div>
            </div>

            <div class="action-buttons">
                <button class="add-to-cart">Add to cart - LE 699.00</button>
                <button class="wishlist-btn"><i class="fa-regular fa-heart"></i></button>
            </div>
            <button class="buy-now">BUY IT NOW</button>
        </div>
    </main>
</body>

</html>
