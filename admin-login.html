<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICLOTH - Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #042a25;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .login-card h2 {
            margin-bottom: 25px;
            font-weight: 600;
            color: #80d611;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #80d611;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #80d611;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            color: black;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #6bbb0e;
        }

        .error-msg {
            color: #c2213a;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <h2>ICLOTH Admin Hub</h2>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" id="email" required placeholder="m13@gmail.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">Sign In Securely</span>
                <div class="loader" id="loader"></div>
            </button>
            <div class="error-msg" id="errorMsg">Incorrect email or password.</div>
        </form>
    </div>

    <script type="module" src="admin-login.js"></script>
</body>

</html>
