<!DOCTYPE html>
<html lang="ar" dir="rtl" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>الكوبونات | ICLOTH</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div class="glass-sidebar" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4">
                <img src="logo/logo2..png" alt="ICLOTH" style="height: 40px;">
                <h5 class="fw-bold mt-2">لوحة التحكم</h5>
            </div>
            <div class="list-group list-group-flush my-3 px-3">
                <a href="dashboard.html" class="list-group-item"><i class="fa-solid fa-house me-2"></i> الإحصائيات</a>
                <a href="products-enhanced.html" class="list-group-item"><i class="fa-solid fa-box-open me-2"></i> المنتجات</a>
                <a href="orders.html" class="list-group-item"><i class="fa-solid fa-cart-shopping me-2"></i> الطلبات</a>
                <a href="categories.html" class="list-group-item"><i class="fa-solid fa-tags me-2"></i> الفئات</a>
                <a href="customers.html" class="list-group-item"><i class="fa-solid fa-users me-2"></i> العملاء</a>
                <a href="coupons.html" class="list-group-item active"><i class="fa-solid fa-ticket me-2"></i> الكوبونات</a>
                <a href="reports.html" class="list-group-item"><i class="fa-solid fa-chart-line me-2"></i> التقارير</a>
                <a href="#" onclick="logout()" class="list-group-item text-danger border-top mt-auto"><i class="fa-solid fa-right-from-bracket me-2"></i> خروج</a>
            </div>
        </div>
        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-dark glass-nav px-4 py-3">
                <h5 class="mb-0 text-white fw-bold">إدارة الكوبونات</h5>
                <button class="btn btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#couponModal"><i class="fa-solid fa-plus me-2"></i>إضافة كوبون</button>
            </nav>
            <div class="container-fluid px-4 py-4">
                <div class="glass-card">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover mb-0">
                            <thead><tr><th>الكود</th><th>النوع</th><th>القيمة</th><th>الحد الأدنى</th><th>تاريخ الانتهاء</th><th>الاستخدام</th><th>إجراءات</th></tr></thead>
                            <tbody id="couponsTable"><tr><td colspan="7" class="text-center py-4">جاري التحميل...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="couponModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content glass-card">
                <div class="modal-header border-0"><h5 class="modal-title">كوبون جديد</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="couponForm">
                        <div class="mb-3"><label>كود الكوبون</label><input type="text" id="code" class="form-control" required></div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label>النوع</label><select id="type" class="form-select"><option value="percent">نسبة %</option><option value="fixed">مبلغ ثابت</option></select></div>
                            <div class="col-md-6 mb-3"><label>القيمة</label><input type="number" id="value" class="form-control" required></div>
                        </div>
                        <div class="mb-3"><label>الحد الأدنى للطلب</label><input type="number" id="min_order" class="form-control" value="0"></div>
                        <div class="mb-3"><label>تاريخ الانتهاء</label><input type="date" id="expiry" class="form-control" required></div>
                        <button type="submit" class="btn btn-primary w-100">حفظ الكوبون</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/coupons.js"></script>
</body>
</html>
