<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICLOTH | تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --primary: #c2213a;
            --text: #ffffff;
            --muted: #808080;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .form-control {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.05);
            border-color: var(--primary);
            box-shadow: none;
            color: white;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            padding: 12px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-google {
            background: white;
            color: black;
            border-radius: 12px;
            padding: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            border: none;
            margin-top: 15px;
        }
        .logo-box { text-align: center; margin-bottom: 30px; }
        .logo-box img { height: 50px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <img src="logo/logo2..png" alt="ICLOTH">
            <h4 class="mt-3 fw-black">لوحة التحكم</h4>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small text-muted">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" placeholder="admin@icloth.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted">كلمة المرور</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">تسجيل الدخول</button>
        </form>

        <div class="text-center my-4 text-muted small">أو</div>

        <button onclick="loginWithGoogle()" class="btn btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            الدخول عبر Google
        </button>
    </div>

    <script type="module">
        import { auth, signInWithEmailAndPassword } from './firebase-config.js';
        import { GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button');

            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحقق...';
            submitBtn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> تم بنجاح';
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                alert('فشل تسجيل الدخول: ' + error.message);
                submitBtn.innerHTML = originalBtnContent;
                submitBtn.disabled = false;
            }
        });

        window.loginWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('فشل تسجيل الدخول عبر Google: ' + error.message);
            }
        };

        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js');
          });
        }
    </script>
</body>
</html>
