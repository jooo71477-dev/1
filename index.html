<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICLOTH | متجر الملابس الراقية</title>
  <meta name="description" content="ICLOTH — متجر ملابس راقية في كفر شكر. أحدث الأزياء بأفضل جودة.">
  <meta name="theme-color" content="#080808">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo/logo2..png">
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ── HOME PAGE SPECIFIC ── */

    /* HERO */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #000;
    }

    /* Animated bg gradient */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 110%, rgba(194,33,58,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 60%, rgba(194,33,58,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 50% 40% at 90% 60%, rgba(194,33,58,0.07) 0%, transparent 50%);
      animation: heroGlow 10s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes heroGlow {
      from { opacity: 0.7; transform: scale(1); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    /* Noise texture overlay */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 80px 40px 40px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(194,33,58,0.12);
      border: 1px solid var(--red-border);
      border-radius: 50px;
      padding: 6px 16px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 28px;
      animation: fadeDown 0.8s var(--ease) both;
    }

    .hero-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .hero-title {
      font-family: var(--font-brand);
      font-size: clamp(5rem, 18vw, 16rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -4px;
      margin-bottom: 32px;
      background: linear-gradient(180deg, #ffffff 40%, rgba(255,255,255,0.45) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 1s var(--ease) 0.2s both;
      cursor: pointer;
    }

    .hero-sub {
      font-size: 0.85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 48px;
      animation: fadeIn 1s var(--ease) 0.4s both;
    }

    .hero-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeIn 1s var(--ease) 0.6s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scrolling marquee */
    .marquee-wrap {
      position: relative;
      z-index: 10;
      overflow: hidden;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      padding: 12px 0;
      white-space: nowrap;
    }

    .marquee-track {
      display: inline-flex;
      animation: marquee 20s linear infinite;
      gap: 0;
    }

    [dir="rtl"] .marquee-track { animation-direction: reverse; }

    .marquee-track span {
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 32px;
    }

    .marquee-track span.dot {
      color: var(--red);
      padding: 0;
      font-size: 0.5rem;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* FEATURES SECTION */
    .features {
      padding: 80px 48px;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      transition: all 0.3s var(--ease);
    }

    .feature-card:hover {
      border-color: var(--red-border);
      background: rgba(194,33,58,0.05);
      transform: translateY(-4px);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background: var(--red-dim);
      border: 1px solid var(--red-border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--red);
      margin-bottom: 20px;
    }

    .feature-card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* CATEGORIES SECTION */
    .categories-section {
      padding: 0 48px 80px;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }

    .section-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .cats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      display: block;
    }

    .cat-card:hover {
      border-color: var(--border2);
      transform: translateY(-3px);
    }

    .cat-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }

    .cat-card h4 {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .cat-card p {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .features-grid { grid-template-columns: 1fr; }
      .cats-grid { grid-template-columns: repeat(2, 1fr); }
      .features, .categories-section { padding-inline: 20px; }
    }
  </style>
  <link rel="stylesheet" href="sketch-ui.css">
</head>
<body>

  <!-- HEADER (injected by JS) -->
  <div id="header-mount"></div>

  <!-- ████ SKETCH HERO ████ -->
  <section class="sketch-hero">
    <div class="ad-box">
        <span class="label" data-i18n="ad_example">إعلان مثال</span>
        <h1 data-i18n="ad_text">إشترى قطعتين واحصل على هدية</h1>
        <div class="sub">
            <svg width="100" height="20" viewBox="0 0 100 20" style="margin: 0 auto;">
                <path d="M0,10 Q25,0 50,10 T100,10" fill="none" stroke="var(--sketch-red)" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <div class="big-discount" data-i18n="big_discount">أقوى خصومات</div>
  </section>

  <!-- BOTTOM NAV (injected by JS) -->
  <div id="bottom-nav-mount"></div>

  <!-- FOOTER (injected by JS) -->
  <div id="footer-mount"></div>

  <script type="module">
    import { initLang, initPWA, buildHeader, buildFooter, buildBottomNav, TRANSLATIONS, currentLang } from './i18n.js';

    // Inject header, footer & bottom nav
    function injectUI(lang) {
      document.getElementById('header-mount').innerHTML = buildHeader('home');
      document.getElementById('footer-mount').innerHTML = buildFooter();
      document.getElementById('bottom-nav-mount').innerHTML = buildBottomNav('home');
    }

    // Initial injection
    injectUI(currentLang);

    // Init language & PWA
    initLang();
    initPWA();

    // Build marquee
    function buildMarquee(t) {
      const items = [
        t.nav_home, '·', t.nav_shop, '·', 'ICLOTH', '·', t.sub_tagline, '·', 'KAFR SHUKR', '·',
        t.nav_home, '·', t.nav_shop, '·', 'ICLOTH', '·', t.sub_tagline, '·', 'KAFR SHUKR', '·',
      ];
      document.getElementById('marqueeTrack').innerHTML =
        items.map(i => `<span${i === '·' ? ' class="dot"' : ''}>${i}</span>`).join('');
    }

    // Dynamic translations for non-data-i18n elements
    function updatePageText(lang) {
      const t = TRANSLATIONS[lang];
      const isAr = lang === 'ar';

      if (document.getElementById('featuresTitle')) document.getElementById('featuresTitle').textContent = isAr ? 'لماذا تختارنا؟' : 'Why Choose Us?';
      if (document.getElementById('feat1Title')) document.getElementById('feat1Title').textContent = isAr ? 'شحن سريع' : 'Fast Shipping';
      if (document.getElementById('feat1Sub')) document.getElementById('feat1Sub').textContent = isAr ? 'توصيل لجميع محافظات مصر خلال 24-72 ساعة بأفضل الأسعار.' : 'Delivery across Egypt within 24-72 hours at the best rates.';
      if (document.getElementById('feat2Title')) document.getElementById('feat2Title').textContent = isAr ? 'جودة مضمونة' : 'Guaranteed Quality';
      if (document.getElementById('feat2Sub')) document.getElementById('feat2Sub').textContent = isAr ? 'كل منتج يمر بفحص جودة دقيق قبل الشحن.' : 'Every product passes quality inspection before shipping.';
      if (document.getElementById('feat3Title')) document.getElementById('feat3Title').textContent = isAr ? 'إرجاع مجاني' : 'Free Returns';
      if (document.getElementById('feat3Sub')) document.getElementById('feat3Sub').textContent = isAr ? 'إرجع المنتج خلال 14 يوم بدون رسوم.' : 'Return within 14 days, no questions asked.';
      if (document.getElementById('catsTitle')) document.getElementById('catsTitle').textContent = isAr ? 'تسوق حسب الفئة' : 'Shop by Category';
      if (document.getElementById('cat1')) document.getElementById('cat1').textContent = isAr ? 'جاكيتات' : 'Jackets';
      if (document.getElementById('cat1sub')) document.getElementById('cat1sub').textContent = isAr ? 'مجموعة شتوية' : 'Winter Collection';
      if (document.getElementById('cat2')) document.getElementById('cat2').textContent = isAr ? 'تيشرتات' : 'T-Shirts';
      if (document.getElementById('cat2sub')) document.getElementById('cat2sub').textContent = isAr ? 'راحة وستايل' : 'Comfort & Style';
      if (document.getElementById('cat3')) document.getElementById('cat3').textContent = isAr ? 'هوديز' : 'Hoodies';
      if (document.getElementById('cat3sub')) document.getElementById('cat3sub').textContent = isAr ? 'دافئة وأنيقة' : 'Warm & Stylish';
      if (document.getElementById('cat4')) document.getElementById('cat4').textContent = isAr ? 'بناطيل' : 'Pants';
      if (document.getElementById('cat4sub')) document.getElementById('cat4sub').textContent = isAr ? 'كلاسيك ومريح' : 'Classic & Comfy';
      if (document.getElementById('viewAllArrow')) document.getElementById('viewAllArrow').className = isAr ? 'fa-solid fa-arrow-left' : 'fa-solid fa-arrow-right';

      if (document.getElementById('marqueeTrack')) buildMarquee(t);
    }

    // Initial render + listen for lang changes
    const savedLang = localStorage.getItem('icloth_lang') || 'ar';
    updatePageText(savedLang);

    document.addEventListener('langchange', (e) => {
      updatePageText(e.detail.lang);
      injectUI(e.detail.lang);
      initPWA();
    });
  </script>

</body>
</html>
